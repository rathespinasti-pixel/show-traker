<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel="stylesheet" href="Style.css">
     <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
        }
        .container {
            width: 300px;
            margin: 100px auto;
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
         
        .fb{
            background: #3b5998;
            margin-top: 10px;
        }
        .google{
            background: red;
            margin: 5px;
        }
    </style> 
</head>
<body>
    <div class="container">
        <h2>Log in</h2>
        <input type="email"
        placeholder="Email"><br>
        <input type="password"
        placeholder="password"><br>

        <button class="btn">Log in</button>

        <p><a href="#">Forgot your password?</a></p>

        <p>Don't have an account?<a href="#">sign up</a></p>

        <button class="btn fb">Sign in with facebook</button>
        <button class="btn google">Sign in with google</button>
       </div> 

</body>
</html>
